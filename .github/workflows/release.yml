name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build Binaries and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: rollinggo-npm-cli/package-lock.json

      - name: Install dependencies
        working-directory: rollinggo-npm-cli
        run: npm ci

      - name: Build bundles
        working-directory: rollinggo-npm-cli
        run: npm run build

      - name: Build standalone binaries
        working-directory: rollinggo-npm-cli
        run: |
          mkdir -p binaries
          npx @yao-pkg/pkg dist/cli.cjs --targets node18-linux-x64    --output binaries/rollinggo-flight-linux-x64
          npx @yao-pkg/pkg dist/cli.cjs --targets node18-linux-arm64   --output binaries/rollinggo-flight-linux-arm64
          npx @yao-pkg/pkg dist/cli.cjs --targets node18-macos-x64    --output binaries/rollinggo-flight-macos-x64
          npx @yao-pkg/pkg dist/cli.cjs --targets node18-macos-arm64   --output binaries/rollinggo-flight-macos-arm64
          npx @yao-pkg/pkg dist/cli.cjs --targets node18-win-x64      --output binaries/rollinggo-flight-win-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rollinggo-npm-cli/binaries/*
          generate_release_notes: true

      - name: Publish to npm
        working-directory: rollinggo-npm-cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Build package
        working-directory: rollinggo-uv-cli
        run: uv build

      - name: Publish to PyPI
        working-directory: rollinggo-uv-cli
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}
